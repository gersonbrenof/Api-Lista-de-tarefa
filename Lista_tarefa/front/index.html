<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <style>
        body {
            padding: 20px;
        }
        form {
            max-width: 400px;
            margin: 0 auto;
        }
        label {
            margin-top: 10px;
            display: block;
        }
        input[type="text"],
        input[type="date"],
        input[type="checkbox"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }
        input[type="submit"] {
            background-color: #007bff;
            color: #fff;
            padding: 10px;
            border: none;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #0056b3;
        }
        .message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
        }
        .error {
            background-color: #ff9999;
            color: #990000;
        }
        .success {
            background-color: #99ff99;
            color: #006600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Lista de Tarefas</h2>
        <div id="taskListDiv">
            <h2>Lista de Tarefas</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label for="taskName">Nome</label>
                    <input type="text" class="form-control" name="nome" id="taskName" required>
                </div>
                <div class="form-group">
                    <label for="taskDescription">Descrição</label>
                    <input type="text" class="form-control" name="descricao" id="taskDescription" required>
                </div>
                <div class="form-group">
                    <label for="taskDeadline">Data Finalização</label>
                    <input type="date" class="form-control" name="data_fim" id="taskDeadline">
                </div>
                <div class="form-group">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" name="finalizado" id="taskFinished">
                        <label class="form-check-label" for="taskFinished">Finalizado</label>
                    </div>
                </div>
                <input type="submit" class="btn btn-primary" value="Cadastrar Tarefa">
            </form>
            <hr>
            <h2>Lista de Tarefas</h2>
            <table class="table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Descrição</th>
                        <th>Data Finalização</th>
                        <th>Finalizado</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="taskTable">
                    <!-- As linhas da tabela serão preenchidas dinamicamente pelo script -->
                </tbody>
            </table>
        </div>
        <div id="message" class="message" style="display: none;"></div>
    </div>
 
</body>
<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
<script>
    $(document).ready(function() {
        // Função para exibir as tarefas
        function showTasks() {
            $.ajax({
                url: 'http://127.0.0.1:8000/api/Lista/',
                method: 'GET',
                success: function(data) {
                    $('#taskTable').empty();
                    $.each(data, function(index, task) {
                        var row = `<tr data-id="${task.id}">
                            <td>${task.nome}</td>
                            <td>${task.descricao}</td>
                            <td>${task.data_fim}</td>
                            <td>${task.finalizado ? 'Sim' : 'Não'}</td>
                            <td>
                                <button class="btn btn-danger btn-delete">Excluir</button>
                                <button class="btn btn-success btn-finish">Concluir</button>
                            </td>
                        </tr>`;
                        $('#taskTable').append(row);
                    });
                },
                error: function(error) {
                    console.error('Erro ao buscar dados:', error);
                }
            });
        }

        // Chama a função ao carregar a página
        showTasks();

        // Evento de submit do formulário de cadastro de tarefa
        $('#taskForm').submit(function(event) {
            event.preventDefault();
            var formData = $(this).serialize();
            $.ajax({
                url: 'http://127.0.0.1:8000/api/Lista/',
                method: 'POST',
                data: formData,
                success: function() {
                    showTasks();
                    $('#taskForm')[0].reset();
                    showMessage('success', 'Tarefa cadastrada com sucesso.');
                },
                error: function(xhr, status, error) {
                    var errorMessage = xhr.responseJSON && xhr.responseJSON.message ? xhr.responseJSON.message : 'Erro ao cadastrar tarefa.';
                    showMessage('error', errorMessage);
                }
            });
        });

        // Função para exibir mensagens de sucesso ou erro
        function showMessage(type, message) {
            var $messageDiv = $('#message');
            $messageDiv.removeClass('success error').addClass(type).text(message).show();
            setTimeout(function() {
                $messageDiv.hide().removeClass(type);
            }, 5000);
        }

        // Evento de clique no botão "Excluir"
        $('#taskTable').on('click', '.btn-delete', function() {
            var taskId = $(this).closest('tr').data('id');
            if (confirm('Tem certeza de que deseja excluir esta tarefa?')) {
                $.ajax({
                    url: `http://127.0.0.1:8000/api/Lista/${taskId}/`,
                    method: 'DELETE',
                    success: function() {
                        showTasks();
                        showMessage('success', 'Tarefa excluída com sucesso.');
                    },
                    error: function(error) {
                        console.error('Erro ao excluir tarefa:', error);
                        showMessage('error', 'Erro ao excluir tarefa.');
                    }
                });
            }
        });

        // Evento de clique no botão "Concluir"
        $('#taskTable').on('click', '.btn-finish', function() {
            var taskId = $(this).closest('tr').data('id');
            $.ajax({
                url: `http://127.0.0.1:8000/api/Lista/${taskId}/finalizar_tarefa/`,
                method: 'POST',
                success: function() {
                    showTasks();
                    showMessage('success', 'Tarefa concluída com sucesso.');
                },
                error: function(error) {
                    console.error('Erro ao finalizar tarefa:', error);
                    showMessage('error', 'Erro ao finalizar tarefa.');
                }
            });
        });
    });
</script>
</html>
