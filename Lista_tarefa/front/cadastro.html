<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <!-- Você pode adicionar estilos CSS aqui, se necessário -->
    <style>
        /* Adicione estilos CSS personalizados aqui, se necessário */
    </style>
</head>
<body>
    <h2>Cadastro de Usuário</h2>
    <form id="cadastroForm">
        <!-- Div para o campo de nome de usuário -->
        <div>
            <label for="username">Nome de Usuário:</label><br>
            <input type="text" id="username" name="username" required>
        </div>
        <!-- Div para o campo de email -->
        <div>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required>
        </div>
        <!-- Div para o campo de senha -->
        <div>
            <label for="password">Senha:</label><br>
            <input type="password" id="password" name="password" required>
        </div>
        <!-- Botão de envio do formulário -->
        <div>
            <input type="submit" value="Cadastrar">
        </div>
    </form>

    <!-- Script JavaScript para lidar com o envio do formulário -->
    <script>
        document.getElementById("cadastroForm").addEventListener("submit", function(event) {
            event.preventDefault(); // Impede o envio padrão do formulário
            
            const formData = new FormData(this); // Obtém os dados do formulário
            const jsonData = {};
            formData.forEach((value, key) => {jsonData[key] = value}); // Converte os dados em formato JSON
            
            // Envia a solicitação POST para a API
            fetch('http://127.0.0.1:8000/api/cadastrar/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(jsonData), // Converte os dados para JSON e envia no corpo da solicitação
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Erro ao cadastrar usuário');
                }
                return response.json();
            })
            .then(data => {
                console.log('Usuário cadastrado:', data);
                alert('Usuário cadastrado com sucesso!');
                // Faça algo após o cadastro do usuário, como redirecionar para outra página
                 window.location.href = '/index.html/';
            })
            .catch(error => {
                console.error('Erro ao cadastrar usuário:', error.message);
                // Exiba uma mensagem de erro para o usuário
                alert('Erro ao cadastrar usuário. Por favor, tente novamente.');
            });
        });
    </script>
</body>
</html>
